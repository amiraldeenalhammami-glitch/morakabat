<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام مراقبة الامتحانات</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dci2z7ij2/image/upload/v1773820733/images_nfcy4z.png" />
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dci2z7ij2/image/upload/v1773820733/images_nfcy4z.png" />
    <meta name="theme-color" content="#4f46e5" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        // Dispatch a custom event to notify React components if they are already mounted
        window.dispatchEvent(new CustomEvent('pwa-prompt-available'));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
